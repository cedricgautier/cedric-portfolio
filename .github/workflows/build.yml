name: Build

on:
  pull_request:
  push:
    branches-ignore:
      - main

jobs:
  build:
    name: vite build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
