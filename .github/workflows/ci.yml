name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main

jobs:
  check:
    name: Lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint (oxlint)
        run: npm run lint

      - name: Build
        run: npm run build
