name: E2E

on:
  pull_request:
  push:
    branches-ignore:
      - main

jobs:
  e2e:
    name: Playwright smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # The smoke test runs against the production build via `vite preview`,
      # so we build first; Playwright's webServer config starts the preview.
      - name: Build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Smoke test (no console errors / crashes on load)
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
